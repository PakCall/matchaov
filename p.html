<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSC Summer Mini E-Sports Festival</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&family=Boogaloo&family=Lilita+One&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
    font-family: 'Sarabun', sans-serif;
    color: #1a2a4a;
    min-height: 100vh;
    padding: 0 0 60px;
    background: #a8d8f0;
   
    background-image: 
        radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.8) 0%, transparent 60%),
        linear-gradient(180deg, #c8eaf8 0%, #a0ccf0 40%, #7ab8e8 100%);
    position: relative;
    overflow-x: hidden;
}
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background-image: url('preview.webp'); 
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0.15; 
    z-index: -1;
    pointer-events: none;
}

/* ---- Animated clouds ---- */
.clouds{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.cloud{
  position:absolute;
  background:rgba(255,255,255,.6);
  border-radius:50%;
  filter:blur(12px);
  animation:drift linear infinite;
}
.cloud:nth-child(1){width:280px;height:90px;top:8%;animation-duration:28s;left:-300px}
.cloud:nth-child(2){width:200px;height:65px;top:18%;animation-duration:38s;left:-250px;opacity:.6}
.cloud:nth-child(3){width:340px;height:100px;top:5%;animation-duration:45s;left:-350px;opacity:.5}

@keyframes drift{from{transform:translateX(0)}to{transform:translateX(calc(100vw + 400px))}}

/* ---- content wrapper ---- */
.content{position:relative;z-index:1}

/* ---- HEADER ---- */
.header{
  text-align:center;
  padding:36px 16px 24px;
}
.header-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.6);
  border:2px solid rgba(255,255,255,.9);
  border-radius:50px;
  padding:6px 20px;
  font-size:.75rem;
  font-weight:700;
  color:#2a6aad;
  text-transform:uppercase;
  margin-bottom:12px;
  backdrop-filter:blur(8px);
}
.event-title{
  font-family:'Lilita One',cursive;
  font-size:clamp(2rem,8vw,3.5rem);
  line-height:1.1;
  color:#fff;
  text-shadow: 0 4px 15px rgba(0,100,200,0.4);
}
.event-title span{ color:#ffe44a; }

/* ---- main body ---- */
.main{
  padding:10px 10px 32px;
}

/* ---- group cards ---- */
.groups-wrap{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
    max-width:1200px;
    margin:0 auto;
}
.group-card{
  background:rgba(255,255,255,.75);
  border:2px solid rgba(255,255,255,.9);
  border-radius:20px;
  padding:15px;
  flex:1 1 100%; /* มือถือเต็มจอ */
  max-width:580px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  backdrop-filter:blur(10px);
  margin-bottom: 15px;
}

/* คอนเทนเนอร์หลัก */
.bracket-svg-wrap {
    width: 100%;
    overflow: hidden; 
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 10px 0;
}

svg.bracket {
    max-width: 100%; 
    height: auto;    
    transform-origin: top left; 
}
@media (max-width: 600px) {
    .bracket-svg-wrap {
        height: auto;
        display: block;
    }
    svg.bracket {
        /* ใช้ฟีเจอร์บีบขนาดให้พอดีจออัตโนมัติ */
        width: 100vw !important; 
        height: auto !important;
    }
}

.group-title{
  font-family:'Lilita One',cursive;
  font-size:1.1rem;
  padding:6px 18px;
  border-radius:50px;
  display:inline-flex;
  margin-bottom:16px;
}
.ga .group-title{ background:#ff9a3c; color:#fff; }
.gb .group-title{ background:#38b8f0; color:#fff; }

/* slot styles */
.slot-box{
  width:100%;height:100%;
  display:flex;align-items:center;
  padding:0 8px;
  font-size:11px;font-weight:700;
  border-radius:6px;
}
.slot-normal{ background:#fff; border:1px solid #add8e6; color:#1a3a6a; }
.slot-bye{ background:#fff9e6; border:1px dashed #ffaa00; color:#b06000; font-style:italic; }
.slot-winner{ background:#e6f7ff; border:1px solid #1890ff; color:#0050b3; }
.slot-champ{ background:#fff7e6; border:2px solid #ffa940; color:#873800; }
.slot-champ-b{ background:#e6fffb; border:2px solid #13c2c2; color:#00474f; }

/* ---- finals ---- */
.finals-wrap{ max-width:600px; margin:30px auto; padding:0 10px; }
.finals-title{ font-family:'Lilita One',cursive; text-align:center; color:#fff; margin-bottom:15px; font-size:1.5rem; }
.finals-grid{ display:flex; gap:15px; justify-content:center; flex-wrap:wrap; }
.final-match{
  background:rgba(255,255,255,0.8);
  border-radius:15px;
  padding:15px;
  flex: 1 1 250px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.fm-slot{
  background:#fff; border-radius:5px; padding:6px; font-size:0.8rem; font-weight:700; margin:5px 0; border:1px solid #eee;
}

/* ---- legend & team list ---- */
.legend{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; font-size:0.75rem; color:#fff; margin-top:20px; }
.teamlist-tags{ display:flex; gap:5px; flex-wrap:wrap; justify-content:center; padding:10px; }
.tag-a, .tag-b{ padding:4px 10px; border-radius:15px; font-size:0.7rem; font-weight:bold; background:rgba(255,255,255,0.3); color:#fff; border:1px solid rgba(255,255,255,0.5); }

</style>
</head>
